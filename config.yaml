data:
  symbol: BTC/USDT
  input_5m: btc_data/btc_usdt_swap_5m.csv
  input_4h: btc_data/btc_usdt_swap_4h.csv
  use_5m_for_1h: true
  output_dir: outputs

local_box:
  rolling_window: 72
  min_periods: 24
  lower_quantile: 0.20
  upper_quantile: 0.80
  pivot_left: 2
  pivot_right: 2
  pivot_memory: 8
  touch_tolerance: 0.12
  repeated_test_window: 24
  repeated_test_min_gap: 2
  method_weights:
    quantile: 0.50
    pivot: 0.30
    repeated_test: 0.20
  min_width_pct: 0.001
  max_width_pct: 0.08
  stable_change_window: 12
  drift_window: 24
  drift_threshold: 0.35
  squeeze_width_pct: 0.01
  min_methods_each_side: 1

event_false_break:
  overshoot_width_mult: 0.08
  reentry_window: 6
  min_confirmations: 2
  recapture_to_mid_frac: 0.40
  momentum_lookback: 3
  reversal_wick_ratio: 0.45

event_box_initiation:
  edge_tolerance_width_frac: 0.12
  min_confirmations: 2
  momentum_lookback: 3
  reversal_body_frac: 0.25

execution:
  width_pct_min: 0.001
  width_pct_max: 0.06
  method_agreement_min: 0.34
  transition_risk_max: 0.65
  confidence_min_false_break: 0.45
  confidence_min_boundary: 0.50
  side_cooldown_bars_false_break: 4
  side_cooldown_bars_boundary: 6
  allow_states: [STABLE, SQUEEZE]
  false_break_regime_mode: down_only
  regime_lookback_hours: 720
  regime_down_low: -0.20
  regime_down_high: -0.05
  regime_up_low: 0.05
  regime_up_high: 0.20
  false_break_up_long_only: false

risk:
  atr_window: 14
  atr_mult: 1.10
  box_stop_mult: 0.60
  min_stop_pct: 0.002
  max_hold_bars: 30
  early_progress_bars: 16
  early_progress_min_return: 0.0003
  state_stop_grace_bars: 2
  side_cooldown_bars: 4
  circuit_breaker_loss_streak: 3
  circuit_breaker_pause_bars: 16

backtest:
  fee_bps_per_leg: 5
  slippage_bps_per_leg: 2
  half_spread_bps_per_leg: 1
  combine_mode: equal_weight
  engine_weights:
    false_break: 1.00
    boundary: 0.00
  annualization_hours: 8760

ab_study:
  run_baseline: true
  base_variant_name: baseline_regime
  variant_a:
    name: A_late_early_progress
    risk_overrides:
      early_progress_bars: 16
      early_progress_min_return: 0.0003
  variant_b:
    name: B_strict_entry_confirm
    event_false_break_overrides:
      min_confirmations: 3
    execution_overrides:
      confidence_min_false_break: 0.62

visual:
  max_plot_rows: 2500
